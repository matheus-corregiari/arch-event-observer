name: Docs

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup-gradle

      - name: Generate module API docs
        run: ./gradlew :event-observer:dokkaGeneratePublicationHtml :event-observer-compose:dokkaGeneratePublicationHtml

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: python -m pip install --upgrade pip mkdocs-material

      - name: Sync contributing page
        run: python tools/sync_contributing.py

      - name: Build Docs
        run: python -m mkdocs build --strict

      - name: Upload docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          if-no-files-found: warn

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
