name: Master Release

on:
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:
    inputs:
      release_branch:
        description: Release branch name, such as hotfix/2.1.1
        required: true
        type: string
      commit_sha:
        description: Exact master commit to release
        required: true
        type: string
      skip_maven_central:
        description: Skip Maven Central when this version is already published
        required: false
        default: false
        type: boolean

concurrency:
  group: master-release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Tag and publish
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.head.ref, 'release/') ||
      startsWith(github.event.pull_request.head.ref, 'hotfix/')))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha || github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          chmod +x .github/scripts/release-version.sh
          .github/scripts/release-version.sh "${{ inputs.release_branch || github.event.pull_request.head.ref }}"

      - name: Setup
        uses: ./.github/actions/setup-gradle

      - name: Version Name
        uses: ./.github/actions/version-name
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Verify release build
        run: ./gradlew ciBuild

      - name: Publish to Maven Central
        if: github.event_name != 'workflow_dispatch' || inputs.skip_maven_central != true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGN_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGN_KEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGN_PASSWORD }}
        run: ./gradlew ciPublishMavenCentral

      - name: Push release tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          if ! git rev-parse "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            git tag -a "${{ steps.version.outputs.version }}" -m "${{ steps.version.outputs.version }}"
          fi
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Arch Event Observer ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true

      - name: Publish to GitHub Packages
        continue-on-error: true
        timeout-minutes: 20
        env:
          ORG_GRADLE_PROJECT_GITHUB_ACTOR: ${{ github.actor }}
          ORG_GRADLE_PROJECT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGN_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGN_KEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGN_PASSWORD }}
        run: ./gradlew ciPublishGithubPackages
