name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze Java-Kotlin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup-gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      # CodeQL currently supports Kotlin through 2.3.x. Keep the project on 2.4.0 and
      # use the latest compatible compiler only for the instrumented analysis build.
      - name: Select CodeQL-compatible Kotlin
        run: sed -i 's/jetbrains-kotlin = "2.4.0"/jetbrains-kotlin = "2.3.21"/' gradle/libs.versions.toml

      - name: Build public modules
        run: ./gradlew ciBuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
