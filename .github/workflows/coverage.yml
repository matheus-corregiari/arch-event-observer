name: Coverage

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup-gradle

      - name: Tests
        run: ./gradlew allTests

      - name: Coverage Reports
        run: ./gradlew :event-observer:koverXmlReport :event-observer:koverHtmlReport :event-observer:koverVerify

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: event-observer-kover-html
          path: event-observer/build/reports/kover/html
          if-no-files-found: error

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: event-observer-kover-xml
          path: event-observer/build/reports/kover/report.xml
          if-no-files-found: error

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: event-observer/build/reports/kover/report.xml
          fail_ci_if_error: true
