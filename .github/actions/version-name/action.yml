name: "Gets and stores the new version name so we can use it do deploy"
description: "Boilerplate steps"

inputs:
  version:
    description: Explicit release version; falls back to git describe when omitted
    required: false
    default: ""

runs:
  using: "composite"
  steps:

    # Setup versionName because we love it
    - name: Get next version name
      id: new-version
      if: inputs.version == ''
      uses: proudust/gh-describe@v2

    # Write versionName into build file to use properly in the future
    - name: Write version into build file
      shell: bash
      env:
        VERSION_NAME: ${{ inputs.version || steps.new-version.outputs.describe }}
      run: |
        mkdir -p build
        printf '%s\n' "$VERSION_NAME" > build/version-name.txt
